spring.application.name=jobtracker

# Active profile: 'h2' for local dev, 'postgres' for production
spring.profiles.active=h2

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# ── Authentication ────────────────────────────────────────────────────────────
# Set APP_USERNAME and APP_PASSWORD as environment variables before running.
# Never commit real credentials — this repo may be public.
# Example (Mac/Linux):  export APP_USERNAME=hammad APP_PASSWORD=supersecret
app.auth.username=${APP_USERNAME:admin}
app.auth.password=${APP_PASSWORD:changeme123}
